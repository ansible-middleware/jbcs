---
- name: Include install packages
  ansible.builtin.include_tasks: fastpackages.yml
  vars:
    packages_list:
      - unzip
      - procps-ng
      - mailcap
      - jansson
      - libxcrypt-compat
      - brotli
      - yajl

- name: Ensure mime.types file exists
  ansible.builtin.include_tasks: mime_types.yml
